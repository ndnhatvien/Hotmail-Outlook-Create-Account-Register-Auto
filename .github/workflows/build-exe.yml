name: Build EXE (.NET Framework)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Cho phép chạy thủ công

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore HotmailBot.sln

    - name: Build Release
      run: |
        msbuild HotmailBot.sln `
          /p:Configuration=Release `
          /p:Platform="Any CPU" `
          /p:OutputPath=bin\Release\ `
          /m

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HotmailBot-EXE
        path: |
          Hotmail/bin/Release/**/*.exe
          Hotmail/bin/Release/**/*.dll
          Hotmail/bin/Release/**/*.config
        retention-days: 30
